# QuadWork AgentChattr Configuration
# Generated by: npx quadwork init
#
# Agent "command" is the CLI tool: "claude", "codex", "gemini", or a script path.
# "cwd" is the working directory (git worktree) for each agent.
# MCP injection is auto-detected from the command name (claude/codex/gemini).

[meta]
version = "1.0.0"

[server]
port = 8300
host = "127.0.0.1"
data_dir = "./data"

[agents.head]
command = "codex"
cwd = "{{head_cwd}}"
color = "#10a37f"
label = "Head Owner"

[agents.reviewer1]
command = "codex"
cwd = "{{reviewer1_cwd}}"
color = "#22c55e"
label = "Reviewer1 Reviewer"

[agents.reviewer2]
command = "claude"
cwd = "{{reviewer2_cwd}}"
color = "#f59e0b"
label = "Reviewer2 Reviewer"

[agents.dev]
command = "claude"
cwd = "{{dev_cwd}}"
color = "#da7756"
label = "Dev Builder"

[routing]
default = "none"
max_agent_hops = 30

[mcp]
http_port = 8200
sse_port = 8201
