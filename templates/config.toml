# QuadWork AgentChattr Configuration
# Generated by: npx quadwork init
#
# Agent "command" is the CLI tool: "claude", "codex", "gemini", or a script path.
# "cwd" is the working directory (git worktree) for each agent.
# MCP injection is auto-detected from the command name (claude/codex/gemini).

[meta]
version = "1.0.0"

[server]
port = 8300
host = "127.0.0.1"
data_dir = "./data"

[agents.t1]
command = "codex"
cwd = "{{t1_cwd}}"
color = "#10a37f"
label = "T1 Head"

[agents.t2a]
command = "codex"
cwd = "{{t2a_cwd}}"
color = "#22c55e"
label = "T2a Reviewer"

[agents.t2b]
command = "claude"
cwd = "{{t2b_cwd}}"
color = "#f59e0b"
label = "T2b Reviewer"

[agents.t3]
command = "claude"
cwd = "{{t3_cwd}}"
color = "#da7756"
label = "T3 Builder"

[routing]
default = "none"
max_agent_hops = 30

[mcp]
http_port = 8200
sse_port = 8201
