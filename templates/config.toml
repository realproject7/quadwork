# QuadWork AgentChattr Configuration
# Generated by: npx quadwork init

[server]
port = 8300
host = "127.0.0.1"

[project]
name = "{{project_name}}"
repo = "{{repo}}"

[channels]
default = "general"

# Agent definitions — each agent gets its own terminal and working directory.
# The "tool" field specifies the CLI tool used to run the agent.
# Supported tools: "claude" (Claude Code), "codex" (Codex CLI), "gemini" (Gemini CLI)

[agents.t1]
role = "owner"
tool = "claude"
description = "Project owner — creates issues, verifies approvals, merges PRs"
can_code = false

[agents.t2a]
role = "reviewer"
tool = "codex"
description = "Reviewer 1 — reviews PRs, approves or requests changes"
can_code = false

[agents.t2b]
role = "reviewer"
tool = "claude"
description = "Reviewer 2 — independent review, approves or requests changes"
can_code = false

[agents.t3]
role = "builder"
tool = "claude"
description = "Full-stack builder — implements features, opens PRs, addresses feedback"
can_code = true
